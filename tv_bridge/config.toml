# ============================================================
# TradingView-Free-Webhook-Alerts — config.toml
# Repo: https://github.com/soranoo/TradingView-Free-Webhook-Alerts
#
# Setup steps:
#   1. Clone the bridge repo alongside this project:
#        git clone https://github.com/soranoo/TradingView-Free-Webhook-Alerts
#   2. Copy this file into that repo root as config.toml
#   3. Fill in your email credentials below
#   4. Set TV_BRIDGE_API_KEY in india-auto-trader/.env to match ngrok_api_server_auth_key
#   5. Run:  python main.py            (local)
#         or docker-compose up -d      (Docker)
#   6. In TradingView, set every alert's "Message" to:
#        {"symbol":"RELIANCE","action":"BUY","price":{{close}},"strategy":"MyScript","timeframe":"{{interval}}"}
#      Enable "Send email" in alert Actions (free plan — no webhook needed in TV)
# ============================================================

# ── Mode ─────────────────────────────────────────────────────────────────────
# true  = Traditional IMAP mode: reads your email inbox directly
# false = ngrok mode: exposes a local server; use with pipedream/zapier
mode_traditional = true

# ── Email / IMAP (Traditional mode) ──────────────────────────────────────────
# Use a DEDICATED email account — not your personal inbox.
# Gmail: enable 2-Step Verification → create an App Password (16 chars)
#        → use the App Password here, NOT your real Gmail password.
#        Settings → See all settings → Forwarding and POP/IMAP → Enable IMAP
# Outlook/Hotmail: no extra setup needed.
email_address          = "your-alerts-email@gmail.com"
login_password         = "your-app-password-here"
imap_server_address    = "imap.gmail.com"          # Outlook: outlook.office365.com
imap_server_port       = 993
imap_auto_reconnect    = true
imap_auto_reconnect_wait = 10

# ── Webhook Destination ───────────────────────────────────────────────────────
# Point to your FastAPI backend /webhook/tradingview endpoint.
# Local dev:  http://localhost:8000/webhook/tradingview
# Production: https://your-server.com/webhook/tradingview
webhook_urls = [
    "http://localhost:8000/webhook/tradingview",
]

# ── Authentication ────────────────────────────────────────────────────────────
# This key is sent as the X-API-KEY header to your webhook.
# Must match TV_BRIDGE_API_KEY in india-auto-trader/.env
ngrok_api_server_auth_key = "change-me-to-a-random-secret"

# ── ngrok (only needed if mode_traditional = false) ───────────────────────────
ngrok_auth_token = ""

# ── Optional Notifications ────────────────────────────────────────────────────
# Forward alerts to Telegram (same bot as the trading system)
tg_bot_token = ""       # leave empty to disable
tg_chat_id   = ""

# Discord logging
discord_log          = false
discord_webhook_url  = ""

# ── Network ───────────────────────────────────────────────────────────────────
proxy_url = ""          # http://user:pass@host:port  (leave empty if unused)

# ── Logging ───────────────────────────────────────────────────────────────────
log_save       = true
log_color      = true
log_time_zone  = "Asia/Kolkata"
log_full_color = false
